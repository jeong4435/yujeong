# Render 배포 설계도(Blueprint). 저장소를 연결하면 이 파일대로 백엔드가 만들어집니다.
# 대시보드: New + → Blueprint → 이 깃허브 저장소 선택 → Apply
services:
  - type: web
    name: jusikdo-ai-backend
    runtime: python
    plan: free                       # 무료 티어 (15분 미사용 시 잠듦 → keep-alive 핑으로 완화)
    rootDir: stock-ai-backend        # 백엔드 폴더 기준으로 빌드/실행
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: DART_API_KEY            # 값은 깃에 올리지 않음 → 배포 후 대시보드에서 입력
        sync: false
      - key: ANTHROPIC_API_KEY       # (선택) AI 설명 기능용. 없으면 비워둬도 됨
        sync: false
