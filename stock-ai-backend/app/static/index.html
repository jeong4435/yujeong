<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>주식도 AI · 테스트</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#EBF0E8;--paper:#FBFCFA;--ink:#1C2B26;--muted:#5E6B64;
    --teal:#0F8B7A;--teal-d:#0A6357;--coral:#DD5A42;--coral-d:#B23E2B;
    --amber:#FFD66B;--line:#D7DED3;--shadow:rgba(28,43,38,.10)}
  body{font-family:'Pretendard',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    line-height:1.55;letter-spacing:-.01em;-webkit-font-smoothing:antialiased}
  .wrap{max-width:680px;margin:0 auto;padding:30px 18px 80px}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--teal),var(--teal-d));
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;
    box-shadow:0 4px 14px rgba(15,139,122,.35)}
  h1{font-size:23px;font-weight:800;letter-spacing:-.03em}
  h1 .br{color:var(--teal)}
  .tag{color:var(--muted);font-size:13.5px;margin:6px 0 20px}
  .badge-real{display:inline-block;background:#E3F4F0;color:var(--teal-d);font-size:11.5px;font-weight:800;
    padding:3px 10px;border-radius:999px;margin-left:8px;vertical-align:middle}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:20px;
    margin-bottom:14px;box-shadow:0 2px 10px var(--shadow)}
  .row{display:flex;gap:8px}
  input{flex:1;border:2px solid var(--line);background:#fff;border-radius:14px;padding:15px 16px;
    font-family:inherit;font-size:16px;color:var(--ink);outline:none;transition:.15s}
  input:focus{border-color:var(--teal);box-shadow:0 0 0 4px rgba(15,139,122,.13)}
  button{border:none;background:var(--teal);color:#fff;font-family:inherit;font-weight:800;font-size:15px;
    padding:0 22px;border-radius:14px;cursor:pointer;transition:.15s}
  button:hover{background:var(--teal-d)}
  button:disabled{background:#aebbb4;cursor:not-allowed}
  .ex{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}
  .ex span{border:1px solid var(--line);background:#fff;color:var(--muted);font-size:13px;font-weight:600;
    padding:7px 13px;border-radius:999px;cursor:pointer}
  .ex span:hover{border-color:var(--teal);color:var(--teal)}
  h3{font-size:14px;font-weight:800;margin-bottom:12px}
  .price{font-size:26px;font-weight:800;letter-spacing:-.03em}
  .chg{font-size:15px;font-weight:800;margin-left:10px}
  .up{color:var(--teal-d)} .down{color:var(--coral-d)} .flat{color:var(--muted)}
  .kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--line)}
  .kv:last-child{border-bottom:none}
  .kv .k{color:var(--muted);font-size:13.5px;font-weight:600}
  .kv .v{font-size:14.5px;font-weight:700}
  .issue{padding:10px 0;border-bottom:1px dashed var(--line)}
  .issue:last-child{border-bottom:none}
  .issue .d{font-size:12px;color:var(--muted)}
  .issue .t{font-size:14px;font-weight:600;margin-top:2px}
  .muted{color:var(--muted);font-size:13.5px}
  .spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--teal);
    border-radius:50%;margin:24px auto;animation:s .8s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .err{background:#FBE9E4;border:1px solid #f0c9bf;border-radius:13px;padding:14px 16px;
    color:var(--coral-d);font-size:14px;font-weight:600}
  .disc{background:#F2F0E8;border:1px solid #e2ddc9;border-radius:13px;padding:13px 15px;
    font-size:12.5px;color:#7a7257;line-height:1.6;margin-top:18px}
  .explain{font-size:14.5px;line-height:1.65;color:#34423c;white-space:pre-wrap}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="logo">株</div>
    <h1>주식도 <span class="br">AI</span><span class="badge-real">REAL DATA</span></h1>
  </div>
  <div class="tag">DART·KRX에서 가져온 <b>진짜 데이터</b>예요. (백엔드 테스트 화면)</div>

  <div class="card">
    <div class="row">
      <input id="q" placeholder="예: 삼성전자  또는  005930" />
      <button id="go" onclick="run()">조회</button>
    </div>
    <div class="ex">
      <span onclick="pick('삼성전자')">삼성전자</span>
      <span onclick="pick('SK하이닉스')">SK하이닉스</span>
      <span onclick="pick('카카오')">카카오</span>
      <span onclick="pick('현대차')">현대차</span>
      <span onclick="pick('005930')">005930</span>
    </div>
  </div>

  <div id="out"></div>
</div>

<script>
const out = document.getElementById('q');
function pick(v){ document.getElementById('q').value = v; run(); }

function num(n){ return n==null ? '확인 어려움' : Number(n).toLocaleString('ko-KR'); }
function won(n){ return n==null ? '확인 어려움' : Number(n).toLocaleString('ko-KR') + '원'; }
function eok(n){ // 원 단위를 '억' 단위로 보기 좋게
  if(n==null) return '확인 어려움';
  const e = n/1e8;
  return (Math.abs(e)>=1 ? e.toLocaleString('ko-KR',{maximumFractionDigits:0}) : (n/1e4).toLocaleString('ko-KR'))
         + (Math.abs(e)>=1 ? '억원' : '만원');
}

async function run(){
  const q = document.getElementById('q').value.trim();
  if(!q) return;
  const box = document.getElementById('out');
  const btn = document.getElementById('go');
  btn.disabled = true;
  box.innerHTML = '<div class="card"><div class="spin"></div><div class="muted" style="text-align:center">DART·KRX에서 데이터 가져오는 중… (처음엔 종목목록 받느라 조금 걸려요)</div></div>';
  try{
    const r = await fetch('/api/stock/' + encodeURIComponent(q));
    const d = await r.json();
    if(d.error){ box.innerHTML = '<div class="card"><div class="err">⚠️ '+d.error+'</div></div>'; return; }
    render(d);
  }catch(e){
    box.innerHTML = '<div class="card"><div class="err">⚠️ 서버에 연결하지 못했어요. uvicorn 이 켜져 있는지 확인하세요.</div></div>';
  }finally{ btn.disabled = false; }
}

function render(d){
  const dir = d.change_pct==null ? 'flat' : (d.change_pct>0 ? 'up' : d.change_pct<0 ? 'down' : 'flat');
  const arrow = dir==='up'?'▲':dir==='down'?'▼':'·';
  const f = d.financials || {};
  const fu = d.fundamentals || {};
  let html = '';

  html += '<div class="card">';
  html += '<h3>'+d.name+' <span class="muted" style="font-weight:600">'+d.code+'</span></h3>';
  html += '<div><span class="price">'+won(d.price)+'</span>';
  if(d.change_pct!=null) html += '<span class="chg '+dir+'">'+arrow+' '+d.change_pct+'%</span>';
  html += '</div>';
  if(d.as_of) html += '<div class="muted" style="margin-top:4px">🕒 '+d.as_of+' 종가 기준</div>';
  html += '</div>';

  html += '<div class="card"><h3>📊 거래량 · 밸류에이션</h3>';
  html += kv('거래량', num(d.volume) + (d.volume!=null?'주':''));
  html += kv('PER (주가수익비율)', fu.per!=null?fu.per:'확인 어려움');
  html += kv('PBR (주가순자산비율)', fu.pbr!=null?fu.pbr:'확인 어려움');
  html += kv('EPS (주당순이익)', fu.eps!=null?num(fu.eps)+'원':'확인 어려움');
  html += '</div>';

  html += '<div class="card"><h3>💰 재무 (DART '+(f.year||'')+' 사업보고서)</h3>';
  html += kv('매출액', eok(f.revenue));
  html += kv('영업이익', eok(f.operating_profit));
  html += kv('당기순이익', eok(f.net_income));
  html += '</div>';

  html += '<div class="card"><h3>📑 최근 공시 (DART)</h3>';
  if(d.disclosures && d.disclosures.length){
    d.disclosures.forEach(x=>{
      html += '<div class="issue"><div class="d">'+x.date+'</div><div class="t">'+x.title+'</div></div>';
    });
  } else { html += '<div class="muted">최근 공시를 찾지 못했어요.</div>'; }
  html += '</div>';

  if(d.explanation){
    html += '<div class="card"><h3>💬 주식도AI 한마디</h3><div class="explain">'+d.explanation+'</div></div>';
  }

  html += '<div class="disc"><b>참고용 안내.</b> 시세·거래량은 종가 기준이라 장중 실시간과 다를 수 있어요. '
        + '투자 권유가 아닌 정보 정리용이며, 실제 투자 전엔 증권사 앱·DART 원문으로 직접 확인하세요.</div>';

  document.getElementById('out').innerHTML = html;
}
function kv(k,v){ return '<div class="kv"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>'; }

document.getElementById('q').addEventListener('keydown', e=>{ if(e.key==='Enter') run(); });
</script>
</body>
</html>
